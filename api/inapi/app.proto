syntax = "proto3";

package inapi;

option optimize_for = LITE_RUNTIME;
option go_package = "./;inapi";

import "common.proto";

// AppInstance represents a deployed application instance in the cluster.
// It is the top-level resource that encapsulates the application specification,
// operational parameters, and current status.
message AppInstance {
  // meta contains the standard resource metadata (id, name, etc.).
  Metadata meta = 1;

  // todo map<string, string> labels = 6;

  // todo map<string, string> annotations = 7;

  // spec defines the desired state and configuration of the application.
  AppSpec spec = 10;

  // deploy specifies the deployment parameters and desired actions.
  AppDeploy deploy = 20;

  // status reflects the current observed state of the application instance.
  // AppStatus status = 30;

  // revision is an internal revision number for data synchronization.
  uint64 revision = 21;

  // ref_by_instances records names of other app instances that reference
  // this instance as a dependency. Maintained by the zonelet to track
  // reverse dependency links.
  repeated string ref_by_instances = 22;
}

// AppSpec defines the specification of an application, including its resources,
// services, executors, packages, dependencies, and configuration.
message AppSpec {
  // kind indicates the type of application (e.g., "app", "service").
  string kind = 1;

  // name is the unique name of the application specification.
  string name = 2;

  // version is the semantic version of the application specification,
  // following the SemVer format (e.g., "1.0.0", "2.1.3-beta").
  string version = 3;

  // description provides a human-readable description of the application.
  string description = 4;

  // image specifies the container image to use (e.g., docker image).
  string image = 5;

  // resources defines the compute resource requirements and limits.
  AppSpecResources resources = 10;

  // depends is a list of application-level dependencies.
  repeated AppSpecDepend depends = 11;

  // service_depends is a list of service-level dependencies.
  repeated AppSpecDepend service_depends = 12;

  // service_ports is a list of service ports exposed by the application.
  repeated AppSpecServicePort service_ports = 13;

  // packages is a list of software packages required by the application.
  repeated AppSpecPackage packages = 20;

  // configs defines the configuration schema for the application.
  repeated AppSpecConfigItem configs = 21;

  // tasks is a list of tasks (commands/scripts) that run within the
  // application.
  repeated AppSpecTask tasks = 30;
}

// AppSpecResources defines the resource allocation for an application.
message AppSpecResources {
  // cpu_limit specifies the maximum CPU resources allowed (e.g., "500m" for 0.5
  // cores).
  string cpu_limit = 2;

  // memory_limit specifies the maximum memory resources allowed (e.g.,
  // "512Mi").
  string memory_limit = 3;

  // volume_limit specifies the maximum storage volume allowed (e.g., "10Gi").
  string volume_limit = 4;
}

// AppSpecPackage represents a software package dependency.
message AppSpecPackage {
  // name is the name of the package.
  string name = 2;

  // version specifies the required version of the package.
  string version = 3;
}

// AppSpecDepend represents a dependency on another application or service.
message AppSpecDepend {
  // name is the name of the dependent application or service.
  string name = 2;

  // version specifies the required version of the dependency.
  string version = 3;
}

message AppSpecServicePort {
  string name = 1;

  uint32 port = 2;
}

// AppSpecTask defines a task execution entity with trigger logic and fault
// tolerance strategies.
message AppSpecTask {
  // name is the unique identifier of the task.
  string name = 1;

  // working_dir specifies the working directory for command execution.
  string working_dir = 2;

  // run_user specifies the user identity for command execution.
  string run_user = 3;

  // depends_on is a list of task names that must complete successfully
  // before this task can run (used with trigger).
  repeated string depends_on = 6;

  // Trigger fields (mutually exclusive: only one should be set at a time):
  // - on_startup: triggers immediately when the application starts.
  // - on_shutdown: triggers before the application shuts down.
  // - interval_seconds: triggers periodically (every N seconds).
  // - cron: triggers on a schedule (standard cron expression).
  bool on_startup = 10;
  bool on_shutdown = 11;
  int64 interval_seconds = 12;
  string cron = 13;

  // max_attempts is the maximum number of execution attempts (1 means no
  // retry).
  uint32 max_attempts = 20;

  // retry_backoff_seconds is the interval/backoff time between retries.
  uint32 retry_backoff_seconds = 21;

  // script is the command or script to execute (split command and args to
  // prevent shell injection).
  string script = 30;
}

// AppDeploy defines the deployment parameters and desired actions for an
// application.
message AppDeploy {
  // action specifies the desired operation (manually set by user).
  // Valid values: start, stop, destroy.
  string action = 1;

  // revision is the operational revision for optimistic concurrency control.
  uint64 revision = 2;

  // cpu_limit specifies the CPU limit in millicores (e.g., 500 = 0.5 cores).
  int64 cpu_limit = 10;

  // memory_limit specifies the memory limit in bytes.
  int64 memory_limit = 11;

  // volume_limit specifies the volume limit in bytes.
  int64 volume_limit = 12;

  // configs is a list of deployment configs.
  repeated AppDeployConfigItem configs = 13;

  // replica_cap specifies the desired number of replicas.
  uint32 replica_cap = 19;

  // replicas is a list of replica deployment states.
  repeated AppDeployReplica replicas = 20;

  // depends is a list of resolved dependency bindings that map each
  // dependent AppSpec.Name to a concrete deployed AppInstance.Name.
  repeated AppDeployDepend depends = 21;
}

// AppDeployConfigItem represents a single field in a deployment config.
message AppDeployConfigItem {
  // name is the name of the field.
  string name = 1;

  // value is the value of the field.
  string value = 2;

  // type specifies the data type of the field.
  string type = 3;

  // items is a list of fields within this config group.
  repeated AppDeployConfigItem items = 9;
}

// AppDeployDepend represents a resolved dependency binding at deploy time.
// It maps an AppSpec.Name to a concrete deployed AppInstance.Name.
message AppDeployDepend {
  // spec_name is the name of the dependent application specification.
  string spec_name = 1;

  // instance_name is the name of the deployed app instance that satisfies
  // this dependency.
  string instance_name = 2;

  // 由调度器自动赋值
  repeated AppDeployConfigItem configs = 13;

  // 由调度器自动赋值
  repeated AppDeployReplica replicas = 20;
}

// AppDeployReplica represents the deployment state of a replica.
message AppDeployReplica {
  // id is the unique identifier of the replica.
  uint32 id = 1;

  // host_id is the ID of the host where the replica runs.
  string host_id = 2;
  string host_ipv4 = 6;

  // state is the desired state of the replica.
  string state = 3;

  // vpc_ipv4 is the VPC IPv4 address assigned to this replica by IPAM.
  string vpc_ipv4 = 4;

  // service_ports is the list of port mappings allocated for this replica.
  // Each entry maps a container port (box_port) to a host physical port
  // (host_port), assigned by the scheduler when the replica binds to a host.
  repeated AppDeployServicePort service_ports = 5;
}

// AppDeployStage represents a single execution stage within the deployment
// lifecycle of an application. Stages can be nested to model complex,
// multi-level deployment workflows (e.g., a parent stage of "setup" may
// contain child stages such as "download", "configure", "start").
// Each stage tracks its owner, progress, attempt count and timing.
message AppDeployStage {
  // name is the identifier of the stage (e.g., "setup", "start", "healthcheck").
  string name = 1;

  // owner indicates the component responsible for executing this stage
  // (e.g., "scheduler", "zonelet", "hostlet").
  string owner = 2;

  // state is the current execution status of the stage.
  // Valid values: pending, running, success, failed.
  string state = 7;

  // attempt is the current retry count for this stage (0 means the first try).
  int64 attempt = 8;

  // attrs holds additional contextual key-value attributes for the stage,
  // such as intermediate results or driver-specific parameters.
  map<string, string> attrs = 9;

  // message carries human-readable execution details, such as progress
  // information or the last error description.
  string message = 12;

  // created is the time the stage was created, as a unix timestamp in seconds.
  int64 created = 14;

  // finished is the time the stage reached a terminal state (success or
  // failure), as a unix timestamp in seconds. A value of 0 means the stage
  // is still pending or running.
  int64 finished = 15;

  // stages is a list of nested child stages that make up this stage,
  // enabling hierarchical deployment workflows.
  repeated AppDeployStage stages = 16;
}

