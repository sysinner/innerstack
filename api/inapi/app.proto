// AppSpecConfigItem represents a single configuration field in the schema.
message AppSpecConfigItem {
  // name is the programmatic name of the field.
  string name = 1;

  // title is the human-readable title of the field.
  string title = 2;

  // prompt is a hint or placeholder text for the field.
  string prompt = 3;

  // type specifies the data type of the field (e.g., "string", "number",
  // "bool").
  string type = 4;

  // default is the default value of the field.
  string default = 5;

  // auto_fill specifies an auto-fill expression or value.
  string auto_fill = 6;

  // validates is a list of validation rules for the field.
  // repeated Label validates = 7;

  // description provides a detailed description of the field.
  string description = 8;

  repeated AppSpecConfigItem items = 9;
}

message AppDeployServicePort {
  string name = 1;

  uint32 port = 2;

  // host_port is the port number exposed on the host.
  uint32 host_port = 3;

  // lan_addr is the LAN (local area network) address for internal access.
  string lan_addr = 4;

  // wan_addr is the WAN (wide area network) address for external access.
  // string wan_addr = 5;
}

message AppReplicaInstance {
  AppInstance app = 1;

  AppDeployReplica replica = 2;

  string zone_base_domain = 3;
}
