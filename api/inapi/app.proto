// AppSpecConfigItem represents a single configuration field in the schema.
message AppSpecConfigItem {
  // name is the programmatic name of the field.
  string name = 1;

  // title is the human-readable title of the field.
  string title = 2;

  // prompt is a hint or placeholder text for the field.
  string prompt = 3;

  // type specifies the data type of the field (e.g., "string", "number",
  // "bool").
  string type = 4;

  // default is the default value of the field.
  string default = 5;

  // auto_fill specifies an auto-fill expression or value.
  string auto_fill = 6;

  // validates is a list of validation rules for the field.
  // repeated Label validates = 7;

  // description provides a detailed description of the field.
  string description = 8;

  // items holds the child fields of this item. For type "group" it is the
  // group's field set; for type "array_group" it defines the field schema of
  // each replicated group instance.
  repeated AppSpecConfigItem items = 9;

  // key_item applies when type is "array_group": it names the item within
  // items whose value uniquely identifies each replicated group instance
  // (e.g. the database name). The value must match the name of one of items.
  string key_item = 10;

  // unique, when set, requires this field's value to be distinct within a
  // scope. Recognized scopes:
  //   "array_group" : distinct across all instances of the enclosing array_group
  //   "app"         : distinct across the whole app config (flat fields plus
  //                   every array_group instance), values pooled by field name
  // Empty means no uniqueness constraint. The key_item field is always unique
  // within its array_group regardless of this attribute.
  string unique = 11;
}

message AppDeployServicePort {
  string name = 1;

  uint32 port = 2;

  // host_port is the port number exposed on the host.
  uint32 host_port = 3;

  // lan_addr is the LAN (local area network) address for internal access.
  string lan_addr = 4;

  // wan_addr is the WAN (wide area network) address for external access.
  // string wan_addr = 5;
}

message AppReplicaInstance {
  AppInstance app = 1;

  AppDeployReplica replica = 2;

  string zone_base_domain = 3;

  // hostlet_endpoint is the hostlet status-report API endpoint the inagent
  // posts its stage progress to. Written by the hostlet into app_replica.json.
  HostletStatusEndpoint hostlet_endpoint = 4;
}

// HostletStatusEndpoint describes how the inagent reaches the hostlet local
// HTTP API to report in-container stage progress.
message HostletStatusEndpoint {
  // url is the full HTTP URL, e.g. http://10.0.1.5:9534/inagent/status.
  string url = 1;

  // secret_key is a per-replica random secret the inagent presents for
  // authentication.
  string secret_key = 2;
}

// InagentStatusReport is the body the inagent POSTs to the hostlet status
// API. The hostlet merges its stages into the matching replica stage subtree
// and relays them upward to the zone leader.
message InagentStatusReport {
  // instance_name is the app instance name this report belongs to.
  string instance_name = 1;

  // replica_id is the replica id this report belongs to.
  uint32 replica_id = 2;

  // updated is the millisecond unix timestamp this report was generated.
  int64 updated = 3;

  // stages is the set of inagent-owned stage nodes to merge.
  repeated AppDeployStage stages = 4;
}
