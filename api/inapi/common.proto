syntax = "proto3";

package inapi;

option optimize_for = LITE_RUNTIME;
option go_package = "./;inapi";

// Metadata is the standard resource metadata with id, name, timestamps and
// version.
message Metadata {
  string id = 1;   // unique identifier
  string name = 2; // human-readable name
  string user = 3; // owner or creator

  int64 created = 14; // creation time, unix timestamp in seconds
  int64 updated = 15; // last update time, unix timestamp in seconds

  uint64 version = 16; // resource version for optimistic concurrency
}

