syntax = "proto3";

package inapi;

option optimize_for = LITE_RUNTIME;
option go_package = "./;inapi";

import "common.proto";

message Host {
  string id = 1;
  string name = 2;
  string peer_addr = 3;

  string secret_key = 8;

  HostOperate operate = 10;

  HostStatus status = 30;
}

message HostOperate {
  int64 cpu_alloc     = 1; 
  int64 mem_alloc     = 2; 
  int64 storage_alloc = 3;
}

message HostPlatform {
  string os = 1;
  string kernel = 2;
  string arch = 3;
}

message HostVolume {
  string name = 1;
  uint64 total = 2;
  uint64 used = 3;
}

message HostStatus {
  string host_id = 1;

  // Timestamp
  int64 uptime = 5;
  int64 updated = 6;

  // CPU Info
  string cpu_model = 10;
  int32 cpu_cores = 11;
  int64 cpu_sys = 12;
  int64 cpu_user = 13;

  // Memory Info
  int64 mem_total = 20;
  int64 mem_used = 21;
  int64 mem_available = 22;

  // Network Info
  string lan_addr = 30;
  string wan_addr = 31;

  // Network IO
  int64 net_recv_bytes = 40;
  int64 net_recv_count = 41;
  int64 net_sent_bytes = 42;
  int64 net_sent_count = 43;

  // Storage IO
  int64 disk_read_bytes = 50;
  int64 disk_read_count = 51;
  int64 disk_write_bytes = 52;
  int64 disk_write_count = 53;
  // Storage Usage
  int64 disk_total_bytes = 54;
  int64 disk_free_bytes = 55;

  // Container Server Info (支持多种 driver: docker, pouch 等)
  map<string, HostStatus_Container> containers = 60;
}

// 容器服务状态信息
message HostStatus_Container {
  string driver = 1; // 驱动名称: docker, pouch, etc.
  string version = 2; // 驱动版本
  string api_version = 3; // API 版本
  int32 container_num = 4; // 容器数量
  int32 image_num = 5; // 镜像数量
}



message HostService_Zone {
  inapi.Common_Meta meta = 2;
  string action = 3;
  string description = 4;
}

message HostService_ZoneListRequest {}

message HostService_ZoneListResponse {
  repeated HostService_Zone zones = 9;
}

